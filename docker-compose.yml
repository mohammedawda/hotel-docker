version: "3.9"

services:
  app:
    image: php:8.2-fpm
    container_name: hotel_app
    working_dir: /var/www
    volumes:
      - ../backend:/var/www
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - hotel_network
    depends_on:
      - mysql
      - redis

  webserver:
    image: nginx:alpine
    container_name: hotel_webserver
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hotel_network

  mysql:
    image: mysql:8.0
    container_name: hotel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotel_db
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hotel_network

  redis:
    image: redis:alpine
    container_name: hotel_redis
    ports:
      - "6379:6379"
    networks:
      - hotel_network

volumes:
  mysql_data:

networks:
  hotel_network:
    driver: bridge